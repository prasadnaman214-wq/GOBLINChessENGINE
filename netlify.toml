[build]
  # Tell Netlify to run the build in the frontend directory
  base = "frontend"
  
  # The build command to run inside the frontend directory
  command = "npm run build"
  
  # The directory containing the built HTML/JS/CSS files, relative to the base directory
  publish = "dist"

# Rule to rewrite all frontend paths back to index.html (important for React Router/SPAs)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy /api/* requests to your FastAPI backend. 
# Once you deploy your backend (e.g. to Render, Railway, or Fly.io),
# replace the URL below with your live backend API URL.
[[redirects]]
  from = "/api/*"
  to = "http://localhost:8000/api/:splat" # <-- Replace with your live backend URL
  status = 200
  force = true
