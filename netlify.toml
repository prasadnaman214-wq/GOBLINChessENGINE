[build]
  # Tell Netlify to run the build in the frontend directory
  base = "frontend"
  
  # The build command to run inside the frontend directory
  command = "npm run build"
  
  # The directory containing the built HTML/JS/CSS files, relative to the base directory
  publish = "dist"

# Rule to rewrite all frontend paths back to index.html (important for React Router/SPAs)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
